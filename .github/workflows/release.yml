# Builds and publishes wheels on every `v*` tag push (or manually via
# workflow_dispatch, which builds but skips publishing — useful to check
# the matrix still builds without cutting a release).
#
# Versioning: Cargo.toml is the single source of truth (pyproject.toml
# declares `dynamic = ["version"]`, so maturin reads it from there). The
# checked-in Cargo.toml version is just a dev placeholder — this workflow
# overwrites it to match the pushed tag (`.github/scripts/set_version_from_tag.py`)
# before building, so a release's version always comes from the tag, never
# from a manually-edited file that could drift out of sync.
#
# Platforms: manylinux x86_64/aarch64, macOS x86_64/aarch64 (Intel and
# Apple Silicon), Windows x64, plus an sdist. Trimmed from what `maturin
# generate-ci github` produces by default (which also covers musllinux,
# 32-bit/s390x/ppc64le Linux, WASM, Android, and free-threaded builds) —
# add a platform back here if you actually need it.
#
# Every build is verified, not just compiled: each job installs the
# wheel (or sdist) it just built into a fresh venv and runs the real
# test suite against it - natively where the runner already matches the
# target (macOS both targets, Windows, Linux x86_64), under QEMU where it
# doesn't (Linux aarch64, cross-compiled on an x86_64 runner).
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v7
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: python3 .github/scripts/set_version_from_tag.py
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
      # x86_64 runs on this same (x86_64) runner, so it's tested directly;
      # aarch64 is cross-compiled here and can't execute on this runner's
      # CPU, so it's tested under QEMU emulation instead. Building
      # successfully doesn't prove the wheel actually works - installing
      # it and running the real test suite against it does.
      - name: Test wheel
        if: matrix.target == 'x86_64'
        run: |
          python3 -m venv test-env
          test-env/bin/pip install --quiet dist/*.whl pytest
          test-env/bin/python -m pytest tests/ -v
      - name: Test wheel (emulated aarch64)
        if: matrix.target == 'aarch64'
        uses: uraimo/run-on-arch-action@v3
        with:
          arch: aarch64
          distro: ubuntu22.04
          githubToken: ${{ github.token }}
          install: |
            apt-get update -q -y
            apt-get install -q -y python3 python3-venv python3-pip
          run: |
            python3 -m venv test-env
            test-env/bin/pip install --quiet dist/*.whl pytest
            test-env/bin/python -m pytest tests/ -v
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  macos:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v7
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: python3 .github/scripts/set_version_from_tag.py
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
      # Both matrix entries build natively on their own runner (an actual
      # Intel or Apple Silicon Mac) - no cross-compilation, so a plain
      # native install-and-test works for either.
      - name: Test wheel
        run: |
          python3 -m venv test-env
          test-env/bin/pip install --quiet dist/*.whl pytest
          test-env/bin/python -m pytest tests/ -v
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: python3 .github/scripts/set_version_from_tag.py
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist
      - name: Test wheel
        shell: bash
        run: |
          python -m venv test-env
          test-env/Scripts/pip install --quiet dist/*.whl pytest
          test-env/Scripts/python -m pytest tests/ -v
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-windows
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: python3 .github/scripts/set_version_from_tag.py
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      # Installing an sdist means building it from source right there -
      # unlike the prebuilt wheels above, this needs an actual Rust
      # toolchain on the installing machine, same as anyone installing
      # korvex on a platform with no prebuilt wheel would.
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Test sdist
        run: |
          python3 -m venv test-env
          test-env/bin/pip install --quiet dist/*.tar.gz pytest
          test-env/bin/python -m pytest tests/ -v
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: dist

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [linux, macos, windows, sdist]
    environment: pypi
    permissions:
      id-token: write # PyPI Trusted Publishing (OIDC) - no stored token needed
      contents: write # attach wheels to the GitHub Release
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
      - name: Attach wheels to the GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          prerelease: ${{ contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'rc') }}
